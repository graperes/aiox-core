name: Sync Pro Submodule Fallback

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'Optional aiox-pro commit SHA to sync into the pro submodule'
        required: false
        type: string
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Reconcile pro submodule drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRO_REMOTE_FALLBACK_URL: https://github.com/SynkraAI/aiox-pro.git
      SYNC_BRANCH: bot/sync-pro-submodule
    steps:
      - name: Checkout aiox-core
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure git identity
        run: |
          git config user.name "aiox-sync-bot"
          git config user.email "actions@github.com"

      - name: Resolve pro remote
        id: pro-remote
        env:
          PRO_REMOTE_FALLBACK_URL: ${{ env.PRO_REMOTE_FALLBACK_URL }}
          PRO_SUBMODULE_TOKEN: ${{ secrets.PRO_SUBMODULE_TOKEN }}
        run: |
          PRO_REPO_URL=$(git config -f .gitmodules --get submodule.pro.url || true)
          if [ -z "$PRO_REPO_URL" ]; then
            PRO_REPO_URL="$PRO_REMOTE_FALLBACK_URL"
          fi

          AUTH_URL="$PRO_REPO_URL"
          if [ -n "$PRO_SUBMODULE_TOKEN" ] && [[ "$PRO_REPO_URL" == https://github.com/* ]]; then
            echo "::add-mask::$PRO_SUBMODULE_TOKEN"
            AUTH_URL="${PRO_REPO_URL/https:\/\/github.com\//https:\/\/x-access-token:${PRO_SUBMODULE_TOKEN}@github.com\/}"
          fi

          echo "repo_url=$PRO_REPO_URL" >> "$GITHUB_OUTPUT"
          echo "auth_url=$AUTH_URL" >> "$GITHUB_OUTPUT"

      - name: Resolve upstream target
        id: resolve
        env:
          INPUT_SHA: ${{ github.event.inputs.target_sha }}
          PRO_REPO_URL: ${{ steps.pro-remote.outputs.auth_url }}
        run: |
          TARGET_SHA="$INPUT_SHA"
          if [ -z "$TARGET_SHA" ]; then
            TARGET_SHA=$(git ls-remote "$PRO_REPO_URL" refs/heads/main | awk '{print $1}')
          fi

          CURRENT_SHA=$(git ls-tree HEAD pro | awk '{print $3}')

          if [ -z "$TARGET_SHA" ]; then
            echo "::error::Unable to resolve target SHA from the pro remote."
            exit 1
          fi

          if [ -z "$CURRENT_SHA" ]; then
            echo "::error::Unable to resolve the current pro submodule SHA from aiox-core."
            exit 1
          fi

          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=${TARGET_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_SHA" = "$TARGET_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update pro submodule pointer
        if: steps.resolve.outputs.changed == 'true'
        env:
          PRO_REPO_URL: ${{ steps.pro-remote.outputs.auth_url }}
          TARGET_SHA: ${{ steps.resolve.outputs.target_sha }}
        run: |
          rm -rf pro
          git clone "$PRO_REPO_URL" pro
          git -C pro fetch origin main
          if ! git -C pro cat-file -e "$TARGET_SHA^{commit}" 2>/dev/null; then
            git -C pro fetch origin "$TARGET_SHA"
          fi
          git -C pro checkout "$TARGET_SHA"
          git add pro

      - name: Commit sync branch
        if: steps.resolve.outputs.changed == 'true'
        env:
          SHORT_SHA: ${{ steps.resolve.outputs.short_sha }}
          SYNC_BRANCH: ${{ env.SYNC_BRANCH }}
        run: |
          git checkout -B "$SYNC_BRANCH"
          git commit -m "chore: sync pro submodule to $SHORT_SHA"
          git push --force-with-lease origin "$SYNC_BRANCH"

      - name: Create or update PR
        if: steps.resolve.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SHORT_SHA: ${{ steps.resolve.outputs.short_sha }}
          TARGET_SHA: ${{ steps.resolve.outputs.target_sha }}
          CURRENT_SHA: ${{ steps.resolve.outputs.current_sha }}
          SYNC_BRANCH: ${{ env.SYNC_BRANCH }}
        run: |
          PR_URL=$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --head "$SYNC_BRANCH" \
            --base main \
            --state open \
            --json url \
            --jq '.[0].url')

          BODY=$(cat <<EOF
          ## Automated pro sync fallback

          - Previous SHA: \`$CURRENT_SHA\`
          - Target SHA: \`$TARGET_SHA\`
          - Trigger: \`${GITHUB_WORKFLOW}\`

          This PR reconciles the \`pro\` submodule with the latest upstream state from \`SynkraAI/aiox-pro\`.
          Expected npm package scope after Epic 124: \`@aiox-squads/pro\`.
          EOF
          )

          if [ -n "$PR_URL" ]; then
            gh pr edit "$PR_URL" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "chore: sync pro submodule ($SHORT_SHA)" \
              --body "$BODY"
            echo "Updated existing PR: $PR_URL"
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head "$SYNC_BRANCH" \
              --title "chore: sync pro submodule ($SHORT_SHA)" \
              --body "$BODY"
          fi
